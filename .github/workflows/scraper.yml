name: 데이터 수집기

on:
  schedule:
    - cron: '0 0-6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ruby 설치
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: 경제 지표 스크래퍼 실행
        run: ruby economy/economy_scraper.rb
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: 내 주식 스크래퍼 실행
        run: ruby mystocks/mystocks_scraper.rb
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add _data/economy.yml _data/mystocks.yml data/stocks_cache.json || true
          git diff --cached --quiet || git commit -m "자동 업데이트: $(date +'%Y-%m-%d %H:%M') KST"
          git pull --rebase origin master
          git push origin master
